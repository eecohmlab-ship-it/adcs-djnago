{% extends 'temp/index.html' %}

{% load static %}
{% block title %} Student data entry {% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'temp/css/student_entry.css' %}">
{% endblock %}

{% block content %}
    <div class="student-entry-conatainer">
        <h1>{{title}}</h1>
        <div class="form-group">
            <label for="{{ form.name.id_for_label }}"> Full name: </label>
            {{ form.name }}
        </div>
         <div class="form-group">
            <label for="{{ form.email.id_for_label }}"> Email: </label>
            {{ form.email }}
        </div>
        <div class="form-group">
            <label for="{{ form.course.id_for_label }}"> Course: </label>
            {{ form.course }}
        </div>
        <button type="submit" class="submit-btn">
            {% if is_update %} Update Student  {% else %}  Add Student {% endif %}</button>
    </div>

{% endblock %}
